spring.datasource.url=jdbc:mysql://localhost:3306/miniacademy
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8081

app.upload.base-dir=uploads
app.upload.images-dir=${app.upload.base-dir}/images
app.upload.videos-dir=${app.upload.base-dir}/videos

spring.servlet.multipart.max-file-size=120MB
spring.servlet.multipart.max-request-size=130MB