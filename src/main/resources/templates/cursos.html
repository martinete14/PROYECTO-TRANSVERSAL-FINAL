<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Mini Academia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<header class="topbar">
  <h1>Mini Academia</h1>

  <div class="topbar-actions">
    <input id="searchInput" placeholder="Buscar cursos..." />
    <a th:href="@{/web/cursos/nuevo}" class="btn-primary">Nuevo curso</a>
  </div>
</header>

<main class="container">

  <section class="hero">
    <h2>Explora los cursos</h2>
    <p>Contenido visual, dinámico y profesional</p>
  </section>

  <section class="grid">

    <article class="card" th:each="curso : ${cursos}">

      <!-- MEDIA GRANDE -->
      <div class="media">

        <!-- IMAGEN -->
        <img src="https://images.unsplash.com/photo-1529070538774-1843cb3265df"
             class="media-img">

        <!-- VIDEO -->
        <video class="media-video" muted loop>
          <source src="/videos/demo.mp4" type="video/mp4">
        </video>

        <!-- OVERLAY -->
        <div class="overlay">
          <span class="category" th:text="${curso.categoriaNombre}">Categoría</span>
          <h3 th:text="${curso.titulo}">Curso</h3>
        </div>

      </div>

      <!-- INFO -->
      <div class="card-body">

        <p th:text="${curso.descripcion}">
          Descripción del curso
        </p>

        <div class="actions">
          <a th:href="@{/web/cursos/editar/{id}(id=${curso.id})}" class="btn-outline">Editar</a>

          <form th:action="@{/web/cursos/eliminar/{id}(id=${curso.id})}" method="post">
            <button class="btn-danger">Eliminar</button>
          </form>
        </div>

      </div>

    </article>

  </section>

</main>

<script>
document.querySelectorAll(".media").forEach(container => {
  const video = container.querySelector("video");

  container.addEventListener("mouseenter", () => {
    video.style.opacity = 1;
    video.play();
  });

  container.addEventListener("mouseleave", () => {
    video.pause();
    video.currentTime = 0;
    video.style.opacity = 0;
  });
});

// buscador
const search = document.getElementById("searchInput");
search.addEventListener("input", () => {
  const text = search.value.toLowerCase();

  document.querySelectorAll(".card").forEach(card => {
    const title = card.querySelector("h3").textContent.toLowerCase();
    card.style.display = title.includes(text) ? "block" : "none";
  });
});
</script>

</body>
</html>
