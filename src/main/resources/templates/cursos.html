<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Mini Academia | Catálogo de cursos online</title>
  <meta name="description" content="Explora cursos online por categoría, consulta descripciones y gestiona el catálogo de la mini academia.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<header class="topbar" role="banner">
  <h1>Mini Academia</h1>

  <div class="topbar-actions">
    <input id="searchInput" placeholder="Buscar cursos..." />
    <a th:href="@{/web/cursos/nuevo}" class="btn-primary">Nuevo curso</a>
  </div>
</header>

<main class="container py-4" role="main">

  <section class="hero">
    <h2>Explora los cursos</h2>
    <p>Contenido visual, dinámico y profesional para encontrar la mejor formación.</p>
  </section>

  <section class="grid">

    <article class="card" th:each="curso : ${cursos}">

      <!-- MEDIA GRANDE -->
      <div class="media">

        <img th:if="${curso.imagenUrl != null and !#strings.isEmpty(curso.imagenUrl)}"
             th:src="${curso.imagenUrl}"
             class="media-img"
             alt="Imagen del curso">
        <img th:unless="${curso.imagenUrl != null and !#strings.isEmpty(curso.imagenUrl)}"
             src="https://images.unsplash.com/photo-1529070538774-1843cb3265df"
             class="media-img"
             alt="Imagen del curso">

        <video class="media-video" muted loop playsinline th:if="${curso.videoUrl != null and !#strings.isEmpty(curso.videoUrl)}">
          <source th:src="${curso.videoUrl}" type="video/mp4">
        </video>
        <video class="media-video" muted loop playsinline th:unless="${curso.videoUrl != null and !#strings.isEmpty(curso.videoUrl)}">
          <source src="https://cdn.coverr.co/videos/coverr-a-student-working-on-a-laptop-1579/1080p.mp4" type="video/mp4">
        </video>

        <!-- OVERLAY -->
        <div class="overlay">
          <span class="category" th:text="${curso.categoriaNombre}">Categoría</span>
          <h3 th:text="${curso.titulo}">Curso</h3>
          <p class="instructor" th:text="${curso.instructor}">Profesional</p>
        </div>

      </div>

      <!-- INFO -->
      <div class="card-body">

        <p th:text="${curso.descripcion}">
          Descripción del curso
        </p>

        <div class="actions">
          <a th:href="@{/web/cursos/editar/{id}(id=${curso.id})}" class="btn-outline">Editar</a>

          <form th:action="@{/web/cursos/eliminar/{id}(id=${curso.id})}" method="post">
            <button class="btn-danger">Eliminar</button>
          </form>
        </div>

      </div>

    </article>

  </section>

</main>

<footer class="container py-3">
  <section>
    <p class="text-muted mb-0">Mini Academia - Proyecto DAW/DAM 2026</p>
  </section>
</footer>

<script>
document.querySelectorAll(".media").forEach(container => {
  const video = container.querySelector("video");

  container.addEventListener("mouseenter", () => {
    video.style.opacity = 1;
    video.play();
  });

  container.addEventListener("mouseleave", () => {
    video.pause();
    video.currentTime = 0;
    video.style.opacity = 0;
  });
});

// buscador
const search = document.getElementById("searchInput");
search.addEventListener("input", () => {
  const text = search.value.toLowerCase();

  document.querySelectorAll(".card").forEach(card => {
    const title = card.querySelector("h3").textContent.toLowerCase();
    card.style.display = title.includes(text) ? "block" : "none";
  });
});
</script>

</body>
</html>
