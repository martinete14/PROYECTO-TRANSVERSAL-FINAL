<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cursos - Mini Academia</title>
    <meta name="description" content="Listado de cursos disponibles en la academia online">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header class="bg-dark text-white p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <h1 class="mb-0">Mini Academia Lothar</h1>
        <a href="/web/cursos/nuevo" class="btn btn-success">+ Nuevo Curso</a>
    </div>
</header>

<main class="container mt-4">

    <section>
        <h2>Listado de cursos</h2>

        <div class="row">

            <article class="col-md-4 mb-4" th:each="curso : ${cursos}">
                <div class="card h-100">
                    <div class="card-body d-flex flex-column justify-content-between">

                        <div>
                            <h5 class="card-title" th:text="${curso.titulo}"></h5>
                            <p class="card-text" th:text="${curso.descripcion}"></p>

                            <span class="badge bg-primary"
                                  th:text="${curso.categoriaNombre}"></span>
                        </div>

                        <!--  BOTONES -->
                        <div class="mt-3 d-flex gap-2">

                            <!-- ✏️ EDITAR -->
                            <a th:href="@{'/web/cursos/editar/' + ${curso.id}}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <!--  ELIMINAR -->
                            <form th:action="@{'/web/cursos/eliminar/' + ${curso.id}}" method="post">
                                <button class="btn btn-danger btn-sm">Eliminar</button>
                            </form>

                        </div>

                    </div>
                </div>
            </article>

        </div>
    </section>

</main>

<footer class="bg-light text-center p-3 mt-4">
    <p>Proyecto Martinete</p>
</footer>

</body>
</html>
