<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini Academia - Cursos</title>
    <meta name="description" content="Plataforma de gestión de cursos online">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

<header class="text-white p-4 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <h1 class="mb-0">🎓 Mini Academia</h1>
        <a href="/web/cursos/nuevo" class="btn btn-success shadow-sm">
            + Nuevo Curso
        </a>
    </div>
</header>

<main class="container">

    <section>
        <h2 class="mb-4 fw-semibold">Cursos disponibles</h2>

        <div class="row g-4">

            <article class="col-md-4" th:each="curso : ${cursos}">
                <div class="card h-100 shadow-sm p-3">

                    <div>
                        <h5 class="fw-bold mb-2" th:text="${curso.titulo}"></h5>
                        <p class="text-muted mb-3" th:text="${curso.descripcion}"></p>

                        <span class="badge bg-primary mb-3"
                              th:text="${curso.categoriaNombre}"></span>
                    </div>

                    <div class="d-flex gap-2 mt-auto">

                        <a th:href="@{'/web/cursos/editar/' + ${curso.id}}"
                           class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <form th:action="@{'/web/cursos/eliminar/' + ${curso.id}}" method="post">
                            <button class="btn btn-danger btn-sm">Eliminar</button>
                        </form>

                    </div>

                </div>
            </article>

        </div>
    </section>

</main>

<footer class="text-center mt-5 p-4">
    <p>Proyecto DAW · Mini Academia</p>
</footer>

</body>
</html>
