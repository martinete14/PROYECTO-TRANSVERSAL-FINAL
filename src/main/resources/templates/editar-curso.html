<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">
    <h2>Editar Curso</h2>

    <form th:action="@{'/web/cursos/actualizar/' + ${curso.id}}" method="post">

        <div class="mb-3">
            <label>Título</label>
            <input type="text" name="titulo" class="form-control"
                   th:value="${curso.titulo}" required>
        </div>

        <div class="mb-3">
            <label>Descripción</label>
            <input type="text" name="descripcion" class="form-control"
                   th:value="${curso.descripcion}" required>
        </div>

        <div class="mb-3">
            <label>Categoría</label>
            <select name="categoriaId" class="form-control" required>

                <option th:each="cat : ${categorias}"
                        th:value="${cat.id}"
                        th:text="${cat.nombre}"
                        th:selected="${cat.id == curso.categoria.id}">
                </option>

            </select>
        </div>

        <button class="btn btn-primary">Guardar cambios</button>

    </form>
</div>

</body>
</html>
