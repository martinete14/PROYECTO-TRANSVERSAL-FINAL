<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar curso | Mini Academia</title>
    <meta name="description" content="Formulario para editar la información de un curso existente en Mini Academia.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<header class="topbar" role="banner">
    <h1>Mini Academia</h1>
    <div class="topbar-actions">
        <a th:href="@{/web/cursos}" class="btn-outline">Volver al catalogo</a>
    </div>
</header>

<main class="container form-page" role="main">
    <section class="alerts" th:if="${successMessage != null or errorMessage != null}">
        <article class="alert alert-success-custom" th:if="${successMessage != null}" th:text="${successMessage}"></article>
        <article class="alert alert-error-custom" th:if="${errorMessage != null}" th:text="${errorMessage}"></article>
    </section>

    <section class="hero">
        <h2>Editar curso</h2>
        <p>Actualiza los datos y el contenido multimedia del curso.</p>
    </section>

    <section class="form-card">
        <article>
    <h2 class="form-title">Actualizar datos del curso</h2>

    <form th:action="@{'/web/cursos/actualizar/' + ${curso.id}}" method="post" enctype="multipart/form-data">

        <div class="field">
            <label class="field-label">Titulo</label>
            <input type="text" name="titulo" class="field-input"
                   th:value="${curso.titulo}" required>
        </div>

        <div class="field">
            <label class="field-label">Descripcion</label>
            <input type="text" name="descripcion" class="field-input"
                   th:value="${curso.descripcion}" required>
        </div>

        <div class="field">
            <label class="field-label">Profesional / Instructor</label>
            <input type="text" name="instructor" class="field-input"
                   th:value="${curso.instructor}" required>
        </div>

        <div class="field">
            <label class="field-label">URL de imagen (opcional)</label>
            <input type="url" name="imagenUrl" class="field-input"
                   th:value="${curso.imagenUrl}">
        </div>

        <div class="field">
            <label class="field-label">Archivo de imagen (opcional)</label>
            <input type="file" name="imagenFile" class="field-input" accept="image/*">
            <small class="helper-text">Si subes un archivo nuevo, reemplaza la imagen anterior.</small>
        </div>

        <div class="field">
            <label class="field-label">URL de video MP4 (opcional)</label>
            <input type="url" name="videoUrl" class="field-input"
                   th:value="${curso.videoUrl}">
        </div>

        <div class="field">
            <label class="field-label">Archivo de video (opcional)</label>
            <input type="file" name="videoFile" class="field-input" accept="video/mp4,video/*">
            <small class="helper-text">Si subes un archivo nuevo, reemplaza el video anterior.</small>
        </div>

        <div class="field">
            <label class="field-label">Categoria</label>
            <select name="categoriaId" class="field-input" required>

                <option th:each="cat : ${categorias}"
                        th:value="${cat.id}"
                        th:text="${cat.nombre}"
                        th:selected="${cat.id == curso.categoria.id}">
                </option>

            </select>
        </div>

        <div class="form-actions">
            <button class="btn-primary" type="submit">Guardar cambios</button>
            <a th:href="@{/web/cursos}" class="btn-outline">Cancelar</a>
        </div>

    </form>
        </article>
    </section>
</main>

<footer class="container py-3">
    <section>
        <p>Mini Academia - Edicion de cursos</p>
    </section>
</footer>

</body>
</html>
