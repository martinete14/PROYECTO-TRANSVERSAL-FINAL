<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar curso | Mini Academia</title>
    <meta name="description" content="Formulario para editar la información de un curso existente en Mini Academia.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header class="bg-primary text-white p-3">
    <div class="container">
        <h1>Editar curso</h1>
    </div>
</header>

<main class="container mt-4">
    <section>
        <article>
    <h2 class="h4">Actualizar datos del curso</h2>

    <form th:action="@{'/web/cursos/actualizar/' + ${curso.id}}" method="post">

        <div class="mb-3">
            <label>Título</label>
            <input type="text" name="titulo" class="form-control"
                   th:value="${curso.titulo}" required>
        </div>

        <div class="mb-3">
            <label>Descripción</label>
            <input type="text" name="descripcion" class="form-control"
                   th:value="${curso.descripcion}" required>
        </div>

        <div class="mb-3">
            <label>Categoría</label>
            <select name="categoriaId" class="form-control" required>

                <option th:each="cat : ${categorias}"
                        th:value="${cat.id}"
                        th:text="${cat.nombre}"
                        th:selected="${cat.id == curso.categoria.id}">
                </option>

            </select>
        </div>

        <button class="btn btn-primary">Guardar cambios</button>

    </form>
        </article>
    </section>
</main>

<footer class="container py-3">
    <section>
        <p class="text-muted mb-0">Mini Academia - Edición de cursos</p>
    </section>
</footer>

</body>
</html>
