<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${curso.titulo + ' | Aula'}">Aula del curso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar" role="banner">
  <h1 class="brand">Aula Virtual</h1>
  <div class="topbar-actions">
    <div th:replace="~{fragments/user-menu :: menu}"></div>
  </div>
</header>

<main class="page-shell" role="main">
  <section class="hero-cinematic">
    <p class="hero-kicker">CURSO ACTIVO</p>
    <h2 th:text="${curso.titulo}">Titulo del curso</h2>
    <p th:text="${curso.descripcion}">Descripcion del curso</p>
  </section>

  <section class="acquired-panel">
    <header class="acquired-head">
      <h3>Contenido de clase</h3>
      <p class="acquired-user" th:text="${#lists.size(contenidos)} + ' recursos disponibles'">0 recursos disponibles</p>
    </header>

    <div class="aula-content-grid" th:if="${!#lists.isEmpty(contenidos)}">
      <article class="aula-content-card" th:each="contenido : ${contenidos}">
        <header class="aula-content-top">
          <span class="aula-order" th:text="${contenido.orden != null ? 'Bloque ' + contenido.orden : 'Bloque sin orden'}">Bloque 1</span>
          <span class="aula-type"
                th:classappend="${contenido.tipo != null and #strings.equalsIgnoreCase(contenido.tipo, 'VIDEO')} ? ' aula-type--video' : (${contenido.tipo != null and #strings.equalsIgnoreCase(contenido.tipo, 'PDF')} ? ' aula-type--pdf' : ' aula-type--other')"
                th:text="${contenido.tipo != null ? contenido.tipo : 'RECURSO'}">VIDEO</span>
        </header>

        <h4 class="aula-content-title" th:text="${contenido.titulo}">Titulo del contenido</h4>
        <p class="aula-content-description"
           th:text="${contenido.descripcion != null and !#strings.isEmpty(contenido.descripcion) ? contenido.descripcion : 'Sin descripcion disponible.'}">
          Descripcion del contenido.
        </p>

        <footer class="aula-content-actions">
          <a class="btn-primary"
             th:if="${contenido.recursoUrl != null and !#strings.isEmpty(contenido.recursoUrl)}"
             th:href="${contenido.recursoUrl}"
             target="_blank"
             rel="noopener">Abrir recurso</a>
          <span class="aula-resource-missing"
                th:if="${contenido.recursoUrl == null or #strings.isEmpty(contenido.recursoUrl)}">Recurso pendiente de publicar</span>
        </footer>
      </article>
    </div>

    <p class="acquired-empty" th:if="${#lists.isEmpty(contenidos)}">Todavia no hay contenido de clase subido por el profesor.</p>
  </section>
</main>
</body>
</html>
