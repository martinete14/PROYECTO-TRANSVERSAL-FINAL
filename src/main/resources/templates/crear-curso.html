<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear curso | Mini Academia</title>
    <meta name="description" content="Formulario para crear un nuevo curso en la plataforma Mini Academia.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header class="bg-dark text-white p-3">
    <div class="container">
        <h1>Crear Curso</h1>
    </div>
</header>

<main class="container mt-4">

    <section>
        <article>
        <form action="/web/cursos/crear" method="post">

            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" name="titulo" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <input type="text" name="descripcion" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Categoría</label>

                <select name="categoriaId" class="form-control" required>
                    <option value="">Seleccionar categoría</option>

                    <option th:each="cat : ${categorias}"
                    th:value="${cat.id}"
                    th:text="${cat.nombre}">
                </option>

                </select>
            </div>

            <button type="submit" class="btn btn-success">Crear Curso</button>

        </form>
        </article>
    </section>

</main>

<footer class="container py-3">
    <section>
        <p class="text-muted mb-0">Mini Academia - Gestión de cursos</p>
    </section>
</footer>

</body>
</html>
