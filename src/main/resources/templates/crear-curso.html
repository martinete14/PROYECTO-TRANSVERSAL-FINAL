<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear curso | Mini Academia</title>
    <meta name="description" content="Formulario para crear un nuevo curso en la plataforma Mini Academia.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<header class="topbar" role="banner">
    <h1>Mini Academia</h1>
    <div class="topbar-actions">
        <a th:href="@{/web/cursos}" class="btn-outline">Volver al catalogo</a>
    </div>
</header>

<main class="container form-page" role="main">
    <section class="hero">
        <h2>Nuevo curso</h2>
        <p>Completa la informacion y agrega imagen y/o video para su tarjeta.</p>
    </section>

    <section class="form-card">
        <article>
            <h2 class="form-title">Datos del curso</h2>

            <form th:action="@{/web/cursos/crear}" method="post" enctype="multipart/form-data">
                <div class="field">
                    <label class="field-label">Titulo</label>
                    <input type="text" name="titulo" class="field-input" required>
                </div>

                <div class="field">
                    <label class="field-label">Descripcion</label>
                    <input type="text" name="descripcion" class="field-input" required>
                </div>

                <div class="field">
                    <label class="field-label">Profesional / Instructor</label>
                    <input type="text" name="instructor" class="field-input" required>
                </div>

                <div class="field">
                    <label class="field-label">URL de imagen (opcional)</label>
                    <input type="url" name="imagenUrl" class="field-input" placeholder="https://...">
                </div>

                <div class="field">
                    <label class="field-label">Archivo de imagen (opcional)</label>
                    <input type="file" name="imagenFile" class="field-input" accept="image/*">
                    <small class="helper-text">Si subes archivo, se usa en lugar de la URL.</small>
                </div>

                <div class="field">
                    <label class="field-label">URL de video MP4 (opcional)</label>
                    <input type="url" name="videoUrl" class="field-input" placeholder="https://...mp4">
                </div>

                <div class="field">
                    <label class="field-label">Archivo de video (opcional)</label>
                    <input type="file" name="videoFile" class="field-input" accept="video/mp4,video/*">
                    <small class="helper-text">Recomendado MP4 para mejor compatibilidad.</small>
                </div>

                <div class="field">
                    <label class="field-label">Categoria</label>
                    <select name="categoriaId" class="field-input" required>
                        <option value="">Seleccionar categoria</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Crear curso</button>
                    <a th:href="@{/web/cursos}" class="btn-outline">Cancelar</a>
                </div>
            </form>
        </article>
    </section>
</main>

<footer class="container py-3">
    <section>
        <p>Mini Academia - Gestion de cursos</p>
    </section>
</footer>

</body>
</html>
